<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopu -播放器 & 類別系統</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/player.css">
    <link rel="stylesheet" href="styles/pagination.css">
    <link rel="stylesheet" href="styles/genres.css">
</head>
<body>
    <div id="app" class="app">
        <!-- Header -->
        <header id="header" class="header">
            <div class="header__logo">🎬 Monopu</div>
            <nav id="genres-nav" class="genres-nav"></nav>
            <div id="header-nav" class="header__nav"></div>
        </header>

        <!-- Genres Section -->
        <section id="genres" class="genres"></section>

        <!-- Pagination -->
        <nav id="pagination" class="pagination"></nav>

        <!-- Content Grid -->
        <div id="content" class="content">
            <div id="items-grid" class="items-grid"></div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="loading__spinner"></div>
            <p class="loading__text">Завантаження...</p>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="player-modal" class="player-modal hidden">
        <div class="player__container">
            <button id="player-close" class="player__close">✕</button>
            
            <!-- Video Player -->
            <div class="player__video-wrapper">
                <video id="video" class="player__video"></video>
                <div class="player__loading"></div>
            </div>

            <!-- Player Panel -->
            <div class="player__panel">
                <!-- Timeline -->
                <div class="player__timeline-container">
                    <div class="player__timeline">
                        <div id="player-progress" class="player__progress"></div>
                        <div id="player-buffered" class="player__buffered"></div>
                        <input type="range" id="player-range" class="player__range" min="0" max="100" value="0">
                    </div>
                </div>

                <!-- Controls -->
                <div class="player__controls">
                    <button id="player-play" class="player__button player__play">▶</button>
                    <div class="player__time">
                        <span id="player-current">0:00</span>
                        <span class="player__time-sep">/</span>
                        <span id="player-duration">0:00</span>
                    </div>
                    <button id="player-mute" class="player__button">🔊</button>
                    <input type="range" id="player-volume" class="player__volume" min="0" max="100" value="100">
                    <button id="player-fullscreen" class="player__button">⛶</button>
                </div>

                <!-- Info -->
                <div class="player__info">
                    <h3 id="player-title" class="player__info-title"></h3>
                    <p id="player-subtitle" class="player__info-subtitle"></p>
                </div>
            </div>

            <!-- Playlist Sidebar -->
            <div class="player__sidebar">
                <h4 class="player__playlist-title">Плейліст</h4>
                <div id="player-playlist" class="player__playlist"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/player.js"></script>
    <script src="js/genres.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
